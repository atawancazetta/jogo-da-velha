<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="screen-auth">
        <section class="screen-auth">
            <div class="auth-container">
                <div class="auth-header">
                    <h1>Login</h1>
                    <p style="color: var(--color-text-soft); font-size: 0.8rem;">Bem-vindo de volta.</p>
                </div>
                
                <form id="login-form" class="formulario-compacto">
                    <input type="email" id="email" class="input-moderno" placeholder="E-mail" required>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="input-moderno" placeholder="Senha" required>
                        <button type="button" class="btn-toggle-eye" title="Mostrar/Ocultar Senha">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                    <div id="login-error" class="error-message"></div>
                    <button type="submit" class="btn-principal-game">Entrar</button>
                </form>

                <div class="auth-footer">
                    <a href="cadastro.html" class="auth-link">Não tem conta? Cadastrar-se</a>
                </div>
            </div>
        </section>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
