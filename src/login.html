<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jogo da Velha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Conectar</h1>
                <p style="color: var(--color-text-soft); font-size: 0.8rem;">Bem-vindo de volta, Comandante.</p>
            </div>
            
            <form id="login-form" class="formulario-compacto">
                <div class="grupo-opcao">
                    <label>E-mail</label>
                    <input type="email" id="email" class="input-moderno" placeholder="seu@email.com" required>
                </div>
                <div class="grupo-opcao">
                    <label>Senha</label>
                    <input type="password" id="password" class="input-moderno" placeholder="••••••" required>
                </div>
                
                <div id="login-error" style="color: #ff4757; font-size: 0.8rem; margin-bottom: 10px; text-align: center;"></div>
                
                <button type="submit" class="btn-principal-game">Entrar</button>
            </form>

            <div class="auth-footer">
                <a href="./cadastro.html" id="link-cadastro" class="auth-link">Não tem uma conta? Criar conta</a>
            </div>
        </div>
    </div>
    <script type="module" src="login.js"></script>
</body>
</html>
